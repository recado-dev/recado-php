name: Close pull requests (read-only mirror)

# This repository is a READ-ONLY split mirror of a private monorepo, so pull
# requests can never be merged here (the mirror is force-pushed). Politely
# explain that and close any PR automatically.
#
# Notes:
# - Lives in the SOURCE at sdk/php/.github/workflows/ and reaches this mirror's
#   .github/workflows/ via the split. It only runs on the mirror; in the
#   monorepo (mailer-app) the active CI lives at the repo-root .github/.
# - Uses `pull_request_target` so the workflow token has write permissions even
#   for PRs opened from forks.
# - It deliberately does NOT checkout or run any code from the PR — it only
#   comments and closes, which is safe under `pull_request_target`.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          BODY: |
            Thanks for the contribution! 🙏

            This repository is a **read-only mirror** of a private monorepo and is
            force-pushed on every change, so pull requests can't be merged here and
            are closed automatically — this isn't a judgement on your change.

            To get it in, please **open an issue** describing the bug or request.
            The maintainers triage issues and port accepted fixes into the source,
            which flows back out to this mirror. See **CONTRIBUTING.md** for details.
        run: gh pr close "$PR" --comment "$BODY"
